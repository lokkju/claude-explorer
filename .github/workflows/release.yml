name: Release

# Triggered when a version tag (v0.1.0, v0.2.0, v1.2.3-rc1, etc.) is
# pushed. Builds the wheel (including the frontend bundle via the hatch
# build hook) and uploads it to PyPI via Trusted Publishing — no
# long-lived API token in repo secrets.
#
# Cutting a release from your laptop:
#
#     # bump version in pyproject.toml first, commit, push to main
#     git tag v0.2.0
#     git push origin v0.2.0
#
# The workflow auto-runs on the tag push; ~3 min later the wheel is
# live on https://pypi.org/project/claude-explorer/
#
# Prerequisite (one-time): configure the Trusted Publisher at
#   https://pypi.org/manage/project/claude-explorer/settings/publishing/
# with these exact values:
#   * Repository owner: rpeck
#   * Repository name: claude-explorer
#   * Workflow filename: release.yml
#   * Environment name: pypi
#
# The `pypi` GitHub environment (configured in repo Settings →
# Environments) adds a required reviewer gate so an accidental tag
# push doesn't auto-publish. Approve in the Actions UI to release.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'         # v0.1.0, v1.2.3
      - 'v[0-9]+.[0-9]+.[0-9]+-*'       # v0.1.0-rc1, v1.0.0-beta.2

# Trusted Publishing requires the workflow to mint an OIDC token from
# GitHub and trade it with PyPI for an upload token. PyPI verifies the
# claim matches the configured Trusted Publisher record.
permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Test suite (release gate)
    # Pinned to the tagged commit. Runs the full test.yml suite:
    # backend + fetcher + mcp_server pytest AND the Playwright e2e
    # job (now in real-backend fixture mode, see PLANS/2026.06.04-
    # e2e-console-gate-failures-and-fix-plan.md Option C). The
    # `playwright` workflow_call input is kept as a workflow_dispatch
    # escape hatch for future debugging but defaults to true.
    uses: ./.github/workflows/test.yml

  build:
    name: Build wheel
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Node (for the frontend build hook)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend bundle
        working-directory: frontend
        run: npm run build

      - name: Set up uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true

      - name: Build wheel
        # The build hook detects frontend/dist exists and skips npm
        # (we built it above), then copies the bundle into
        # backend/_static/ for inclusion in the wheel.
        env:
          CLAUDE_EXPLORER_SKIP_FRONTEND_BUILD: '1'
        run: uv build --wheel

      - name: Verify wheel contents
        run: |
          set -euo pipefail
          WHEEL=$(ls dist/claude_explorer-*.whl)
          echo "Inspecting $WHEEL"
          # Bundle must be present
          unzip -l "$WHEEL" | grep -q "backend/_static/index.html" \
            || (echo "::error::frontend bundle missing from wheel"; exit 1)
          # License must be present
          unzip -l "$WHEEL" | grep -q "dist-info/licenses/LICENSE" \
            || (echo "::error::LICENSE missing from wheel"; exit 1)
          echo "Wheel contents OK"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist
          path: dist/*.whl
          retention-days: 7

  build-mcpb:
    name: Build MCPB bundle
    # Runs in parallel with `build` (wheel) — they share the test-gate
    # dependency but don't depend on each other.
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required for action-gh-release to upload assets
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Node (for the mcpb CLI)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'

      - name: Install mcpb CLI
        # Claude Desktop extension bundler. Spec lives at
        # https://github.com/anthropics/dxt (repo not yet renamed
        # to mcpb at time of writing). The CLI provides `pack`,
        # `validate`, and `info` subcommands; build-mcpb.py shells
        # out to `pack`.
        run: npm install -g @anthropic-ai/mcpb

      - name: Build MCPB artifact
        # scripts/build-mcpb.py walks the import closure of
        # mcp_server.server, copies the closed-over modules into a
        # tiny self-contained bundle dir, writes manifest.json (read
        # from mcp_server.__version__), then runs `mcpb pack` to
        # produce dist/claude-explorer-${VERSION}.mcpb.
        # Zero pip deps — pure stdlib script.
        run: python scripts/build-mcpb.py

      - name: Verify MCPB artifact
        # Fail-loud guard: if the artifact is missing or empty, the
        # subsequent release-attach step would still "succeed" with no
        # files, silently shipping a release without the .mcpb.
        run: |
          set -euo pipefail
          MCPB=$(ls dist/claude-explorer-*.mcpb | head -1)
          if [ -z "$MCPB" ] || [ ! -s "$MCPB" ]; then
            echo "::error::MCPB artifact missing or empty"
            exit 1
          fi
          echo "MCPB artifact OK: $MCPB ($(du -h "$MCPB" | cut -f1))"

      - name: Attach MCPB to GitHub Release
        # action-gh-release auto-detects the tag from $GITHUB_REF.
        # Idempotent: re-running on the same tag updates the asset.
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844  # v2
        with:
          files: dist/claude-explorer-*.mcpb
          fail_on_unmatched_files: true

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Pin to the `pypi` environment so the trusted-publisher record
    # matches and the required-reviewer gate (configured in Settings →
    # Environments → pypi) fires before upload.
    environment:
      name: pypi
      url: https://pypi.org/project/claude-explorer/
    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist

      - name: Publish via PyPA Trusted Publishing
        # The action mints an OIDC token from GitHub and exchanges it
        # with PyPI. No `password:` / API-token input needed.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          # Default is PyPI; explicit for documentation.
          repository-url: https://upload.pypi.org/legacy/
          # Fail loud if the wheel is missing or malformed rather than
          # silently uploading nothing.
          skip-existing: false
          verbose: true
