name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      playwright:
        description: 'Run the Playwright e2e job'
        type: boolean
        default: true
  workflow_call:   # lets release.yml run this exact suite as a pre-publish gate
    inputs:
      playwright:
        description: |
          Run the Playwright e2e job. Defaults to true; release.yml
          consumes that default so the e2e suite gates publish. The
          input is kept (vs. unconditionally running) so a future
          workflow_dispatch can re-skip it for debugging without
          editing release.yml again.
        type: boolean
        required: false
        default: true

jobs:
  python:
    name: Python (backend + fetcher + mcp_server pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true

      - name: Sync Python deps
        run: uv sync --extra dev

      - name: Backend pytest
        run: uv run pytest backend/tests/ --tb=short

      - name: Fetcher pytest
        run: uv run pytest fetcher/tests/ --tb=short

      - name: MCP server pytest
        run: uv run pytest mcp_server/tests/ --tb=short

  e2e:
    name: Playwright (fixture mode)
    # Skipped only when an explicit `playwright: false` is passed via
    # workflow_call / workflow_dispatch. On push and pull_request the
    # `inputs` context is unavailable and `inputs.playwright` evaluates
    # to an empty string, which is `!= false` — so the e2e job runs
    # by default on every push and PR, and also when release.yml calls
    # this workflow without args. The input exists only as a future
    # debugging escape hatch via `gh workflow run`.
    if: ${{ inputs.playwright != false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true

      - name: Sync Python deps
        run: uv sync --extra dev

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Verify fixtures are up to date
        run: |
          # The fixture generator is deterministic — re-running it must
          # produce byte-identical files. Catch out-of-date fixtures
          # (or accidental hand-edits) before the e2e suite even runs.
          uv run python scripts/generate_e2e_fixtures.py
          if ! git diff --quiet backend/tests/fixtures; then
            echo "::error::Fixtures are out of date. Run 'uv run python scripts/generate_e2e_fixtures.py' and commit the result."
            git diff backend/tests/fixtures
            exit 1
          fi

      - name: Playwright e2e (fixture mode)
        working-directory: frontend
        # playwright.config.ts now starts a real FastAPI backend in
        # fixture mode alongside Vite (see the webServer array there).
        # CLAUDE_EXPLORER_DATA_DIR + CLAUDE_DIR + CLAUDE_DESKTOP_APP_DIR
        # + the DISABLE_* flags are all injected via webServer[0].env.
        run: npx playwright test --reporter=line

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
